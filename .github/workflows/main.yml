name: CI/CD Pipeline - Credit Risk Platform

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  unit-tests:
    name: Unit Tests (96 tests)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: Capstone_Project/Credit-Risk-Intelligence-Platform

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest
          pip install -r requirements.txt

      - name: Create runtime directories
        run: |
          mkdir -p data/uploads data/vectorstore/faiss_index logs data/auth_db data/cities

      - name: Create test .env
        run: |
          cat > .env << 'EOF'
          GEMINI_API_KEY=test-placeholder
          OPENAI_API_KEY=test-placeholder
          PINECONE_API_KEY=test-placeholder
          PINECONE_INDEX_NAME=credit-risk-platform
          VECTOR_STORE_PROVIDER=faiss
          JWT_SECRET_KEY=ci-test-secret-key-32-chars-long-min
          EVALUATION_ENABLED=false
          LLM_PROVIDER=gemini
          EOF

      - name: Run unit tests
        run: |
          python -m pytest tests/unit/ -v --tb=short

  build-and-deploy:
    name: Build Docker and Deploy to Azure
    runs-on: ubuntu-latest
    needs: unit-tests

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.AZURE_ACR_NAME }}.azurecr.io
          username: ${{ secrets.AZURE_ACR_NAME }}
          password: ${{ secrets.AZURE_ACR_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: Capstone_Project/Credit-Risk-Intelligence-Platform
          file: Capstone_Project/Credit-Risk-Intelligence-Platform/infra/Dockerfile
          push: true
          tags: |
            ${{ secrets.AZURE_ACR_NAME }}.azurecr.io/credit-risk-platform:latest
            ${{ secrets.AZURE_ACR_NAME }}.azurecr.io/credit-risk-platform:${{ github.sha }}

      - name: Login to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v2
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
          images: ${{ secrets.AZURE_ACR_NAME }}.azurecr.io/credit-risk-platform:${{ github.sha }}
