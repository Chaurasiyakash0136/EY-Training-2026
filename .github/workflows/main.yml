name: CI Pipeline - Credit Risk Platform

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  unit-tests:
    name: Unit Tests (96 tests)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: Capstone_Project/Credit-Risk-Intelligence-Platform

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create runtime directories
        run: |
          mkdir -p data/uploads data/vectorstore/faiss_index logs data/auth_db data/cities

      - name: Create test .env
        run: |
          cat > .env << 'EOF'
          GEMINI_API_KEY=test-placeholder
          OPENAI_API_KEY=test-placeholder
          PINECONE_API_KEY=test-placeholder
          PINECONE_INDEX_NAME=credit-risk-platform
          VECTOR_STORE_PROVIDER=faiss
          JWT_SECRET_KEY=ci-test-secret-key-32-chars-long-min
          EVALUATION_ENABLED=false
          LLM_PROVIDER=gemini
          EOF

      - name: Run unit tests
        run: |
          python -m pytest tests/unit/ -v --tb=short

  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: unit-tests

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        working-directory: Capstone_Project/Credit-Risk-Intelligence-Platform
        run: |
          docker build -f infra/Dockerfile -t credit-risk-platform:ci .
