# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy container app to Azure Web App - creditriskplatform

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to container registry
        uses: docker/login-action@v2
        with:
          registry: creditriskakash7272.azurecr.io/
          username: ${{ secrets.AZUREAPPSERVICE_CONTAINERUSERNAME_A3F60C2E29BF4F77B7DA8946841C104D }}
          password: ${{ secrets.AZUREAPPSERVICE_CONTAINERPASSWORD_4A3E01B657B241A89CAB9823662AB519 }}

      - name: Build and push container image to registry
        uses: docker/build-push-action@v3
        with:
          context: ./Capstone_Project/Credit-Risk-Intelligence-Platform
          push: true
          tags: creditriskakash7272.azurecr.io/${{ secrets.AZUREAPPSERVICE_CONTAINERUSERNAME_A3F60C2E29BF4F77B7DA8946841C104D }}/credit-risk-platform:${{ github.sha }}
          file: ./Capstone_Project/Credit-Risk-Intelligence-Platform/infra/Dockerfile

  deploy:
    runs-on: ubuntu-latest
    
    needs: build
    
    steps:
      
      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v2
        with:
          app-name: 'creditriskplatform'
          slot-name: 'Production'
          images: 'creditriskakash7272.azurecr.io/${{ secrets.AZUREAPPSERVICE_CONTAINERUSERNAME_A3F60C2E29BF4F77B7DA8946841C104D }}/credit-risk-platform:${{ github.sha }}'
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_D3F2EADFC46E401EB0FAFB5189DC7554 }}
